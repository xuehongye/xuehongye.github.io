<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>图片轮播</title>
	<style>
			#frame{
				position: absolute;
				width: 300px;
				height: 200px;
				overflow: hidden;
				border-radius: 5px;
			}
			#dis{
				position: absolute;
				left: -50px;
				top: -10px;
				opacity: 0.5;
			}
			#dis li{
				display: inline-block;
				width: 200px;
				height: 20px;
				margin: 0 50px;
				float: left;
				text-align: center;
				color: #fff;
				border-radius: 10px;
				background: #000;
			}
			#photos img{
				float: left;
				width: 300px;
				height: 200px;
			}
			#photos{
				position: absolute;
				z-index: 9;
				width: 1500px;

			}
			.play{
				animation: ma 20s ease-out infinite alternate;
			}
			@keyframes ma{
				0%,20%{
					margin-left: 0px;
				}
				25%,40%{
					margin-left: -300px;
				} 
				45%，60%{
					margin-left: -600px;
				}
				65%,80%{
					margin-left: -900px;
				}
				85%,100%{
					margin-left: -1200px;
				}
			}
			.num{
				position: absolute;
				z-index: 10;
				display: inline-block;
				right: 10px;
				top: 165px;
				border-radius: 100%;
				background: #f00;
				width: 25px;
				height: 25px;
				line-height: 25px;
				cursor: pointer;
				color: #fff;
				text-align: center;
				opacity: 0.8;
			}
			.num:hover{
				background: #00f;
			}
			.num:hover.#photos:hover{
				animation-play-state: paused;
			}
			.num:nth-child(2){
				margin-right: 30px;
			}
			.num:nth-child(3){
				margin-right: 60px;
			}
			.num:nth-child(4){
				margin-right: 90px;
			}
			.num:nth-child(5){
				margin-right: 120px;
			}
			#a1:hover ~ #photos{
				animation: ma1 .5s ease-out forwards;
			}
			#a2:hover ~ #photos{
				animation: ma2 .5s ease-out forwards;
			}
			#a3:hover ~ #photos{
				animation: ma3 .5s ease-out forwards;
			}
			#a4:hover ~ #photos{
				animation: ma4 .5s ease-out forwards;
			}
			#a5:hover ~ #photos{
				animation: ma5 .5s ease-out forwards;
			}
			@keyframes ma1 {
				0%{
					margin-left: -1200px;
				}
				100%{
					margin-left: -0px;
				}
			}
			@keyframes ma2 {
				0%{
					margin-left: -1200px;
				}
				100%{
					margin-left: -300px;
				}
			}
			@keyframes ma3 {
				100%{
					margin-left: -600px;
				}
			}
			@keyframes ma4 {
				
				100%{
					margin-left: -900px;
				}
			}
			@keyframes ma5 {
				
				100%{
					margin-left: -120px;
				}
			}
	</style>
</head>
<body>
	<div id="frame">
		<a id="a1" calss="num">1</a>
		<a id="a2" calss="num">2</a>
		<a id="a3" calss="num">3</a>
		<a id="a4" calss="num">4</a>
		<a id="a5" calss="num">5</a>
		<div id="photos" class="play">
			<img src="img/bg.png" alt="">
			<img src="img/y1.jpg" alt="">
			<img src="img/y2.jpg" alt="">
			<img src="img/y3.jpg" alt="">
			<img src="img/banner1.jpg" alt="">
			<ul id="dis">
				<li>ui</li>
				<li>web</li>
				<li>ps</li>
				<li>php</li>
				<li>donghua</li>
			</ul>
		</div>
	</div>
</body>
</html>
